<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
  <title>XACML Policy Atlas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #edf1f4;
      color: #212121;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── Header ── */
    header {
      background: #061E29;
      color: #fff;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 52px;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,.35);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: .3px; flex: 1; }
    .hbtn {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.28);
      color: #fff;
      padding: 5px 11px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      transition: background .15s;
    }
    .hbtn:hover { background: rgba(255,255,255,.22); }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      min-width: 160px;
      background: #edf1f4;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-head {
      padding: 9px 12px 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #212121;
      border-bottom: 1px solid #eeeeee;
    }
    .sidebar-list { flex: 1; overflow-y: auto; }
    .sb-item {
      padding: 8px 12px 7px;
      cursor: pointer;
      border-bottom: 1px solid #f5f5f5;
      border-left: 3px solid transparent;
      transition: background .1s, border-color .1s;
    }
    .sb-item:hover { background: #f5f7ff; }
    .sb-item.active { background: #e8eaf6; border-left-color: #3949ab; }
    .sb-name {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #212121;
    }
    .sb-meta { font-size: 11px; color: #9e9e9e; margin-top: 2px; }
    .sb-bar {
      height: 3px;
      border-radius: 2px;
      margin-top: 5px;
      background: #e0e0e0;
      display: flex;
      overflow: hidden;
    }
    .sb-permit { background: #4CAF50; }
    .sb-deny   { background: #F44336; }
    .sb-empty  { padding: 16px 12px; font-size: 12px; color: #212121; }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 16px; }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 70vh;
      color: #212121;
      gap: 10px;
      user-select: none;
    }
    .empty-state .icon { font-size: 52px; }
    .empty-state p { font-size: 14px; }

    /* ── Accordion ── */
    .acc-panel {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .acc-hdr {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      background: #f8f9ff;
      border-radius: 8px;
      transition: background .15s;
    }
    .acc-hdr.is-open { border-radius: 8px 8px 0 0; border-bottom: 1px solid #e0e0e0; }
    .acc-hdr:hover { background: #eef0ff; }
    .acc-hdr-icon { font-size: 20px; flex-shrink: 0; }
    .acc-hdr-info { flex: 1; min-width: 0; }
    .acc-hdr-title { font-size: 14px; font-weight: 700; color: #1a237e; word-break: break-all; }
    .acc-hdr-desc { font-size: 12px; color: #666; margin-top: 3px; line-height: 1.4; }
    .acc-hdr-badges { display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; padding-top: 2px; }
    .acc-chevron { font-size: 11px; color: #9e9e9e; transition: transform .3s ease; flex-shrink: 0; padding-top: 4px; }
    .acc-chevron.open { transform: rotate(90deg); }
    .acc-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows .3s ease; }
    .acc-body.open { grid-template-rows: 1fr; }
    .acc-inner { overflow: hidden; min-height: 0; }
    .acc-inner-content { padding: 12px 16px 16px; }

    /* ── Control buttons ── */
    .policy-hdr-ctrl { margin-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .ctrl-btn {
      background: #fff;
      border: 1px solid #e0e0e0;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      color: #555;
      transition: background .1s;
    }
    .ctrl-btn:hover { background: #f5f5f5; }

    /* ── Algorithm chip ── */
    .algo-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #eceff1;
      border: 1px solid #cfd8dc;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      color: #546e7a;
      cursor: default;
      position: relative;
    }
    .algo-chip:hover .tooltip { display: block; }

    /* ── Policy target section ── */
    .policy-target {
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 10px;
    }
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #9e9e9e;
      margin-bottom: 7px;
    }

    /* ── Rule card ── */
    .rule-card {
      border-radius: 7px;
      border: 1px solid;
      margin-bottom: 7px;
      overflow: visible;
    }
    .rule-card.permit { border-color: #a5d6a7; }
    .rule-card.deny   { border-color: #ef9a9a; }

    .rule-hdr {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
      transition: filter .1s;
      border-radius: 7px;
    }
    .rule-hdr:hover { filter: brightness(.97); }
    .rule-card.permit .rule-hdr { background: #e8f5e9; }
    .rule-card.deny   .rule-hdr { background: #ffebee; }

    .effect-badge {
      font-size: 10px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: .3px;
      flex-shrink: 0;
    }
    .permit .effect-badge { background: #4CAF50; color: #fff; }
    .deny   .effect-badge { background: #F44336; color: #fff; }

    .rule-title { font-size: 13px; font-weight: 500; flex: 1; color: #212121; }
    .rule-no-desc { font-style: italic; color: #9e9e9e; }
    .rule-toggle { font-size: 11px; color: #9e9e9e; transition: transform .18s; flex-shrink: 0; }
    .rule-toggle.open { transform: rotate(90deg); }

    .rule-body { padding: 10px 14px; display: none; }
    .rule-card.permit .rule-body { border-top: 1px solid #c8e6c9; }
    .rule-card.deny   .rule-body { border-top: 1px solid #ffcdd2; }
    .rule-body.open { display: block; }

    /* ── Match groups ── */
    .match-group { margin-bottom: 10px; }
    .match-group:last-child { margin-bottom: 0; }
    .mg-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #9e9e9e; margin-bottom: 5px; }
    .mg-items { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

    /* ── Logic chips (UND / ODER) ── */
    .logic-chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .4px;
      cursor: default;
      vertical-align: middle;
      position: relative;
      flex-shrink: 0;
    }
    .logic-chip.oder { background: #FF9800; color: #fff; }
    .logic-chip.und  { background: #2196F3; color: #fff; }
    .logic-chip:hover .tooltip { display: block; }

    /* ── Readable match sentence ── */
    .or-group { display: inline-flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .match-sentence { display: inline-flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .match-attr-label {
      font-size: 11px;
      color: #546e7a;
      font-weight: 600;
      white-space: nowrap;
      cursor: default;
      position: relative;
    }
    .match-attr-label:hover .tooltip { display: block; }
    .match-connector { font-size: 11px; color: #9e9e9e; white-space: nowrap; }

    /* ── Chips ── */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px 2px 7px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: default;
      border: 1px solid transparent;
      position: relative;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      vertical-align: middle;
    }
    .chip.fallback {
      background: #f5f5f5 !important;
      border-color: #e0e0e0 !important;
      color: #757575 !important;
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 12px;
      max-width: 320px;
    }
    .chip .star { color: #f9a825; }
    .chip:hover .tooltip { display: block; }

    /* ── FHIR link ── */
    .fhir-link {
      color: #1976d2;
      text-decoration: none;
      font-size: 11px;
      opacity: .75;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .fhir-link:hover { opacity: 1; }

    /* ── Tooltip ── */
    .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 7px);
      left: 0;
      background: #263238;
      color: #eceff1;
      padding: 6px 10px;
      border-radius: 5px;
      font-size: 11px;
      z-index: 200;
      pointer-events: none;
      min-width: 180px;
      max-width: 360px;
      white-space: normal;
      line-height: 1.45;
      box-shadow: 0 3px 10px rgba(0,0,0,.3);
      word-break: break-all;
    }
    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 14px;
      border: 5px solid transparent;
      border-top-color: #263238;
    }
    .tooltip-uri {
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 10px;
      color: #80cbc4;
      display: block;
      margin-top: 3px;
      word-break: break-all;
    }

    /* ── Condition block ── */
    .condition-block {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 5px;
      padding: 7px 10px;
      font-size: 12px;
      line-height: 1.6;
    }
    .cond-not  { color: #c62828; font-weight: 700; }
    .cond-fn   { color: #1565c0; font-weight: 600; }
    .cond-subj { color: #2e7d32; }
    .cond-res  { color: #6a1b9a; }
    .cond-act  { color: #e65100; }
    .cond-val  { color: #37474f; font-family: monospace; }

    /* ── Condition impact ── */
    .cond-impact {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
      padding-bottom: 5px;
      margin-bottom: 6px;
      border-bottom: 1px dashed #ffe082;
    }
    .cond-impact.permit { color: #2e7d32; }
    .cond-impact.deny   { color: #c62828; }
    .no-cond-hint {
      font-size: 12px;
      color: #757575;
      font-style: italic;
      padding: 4px 2px;
      margin-bottom: 4px;
    }

    /* ── Summary box ── */
    .summary-box {
      background: #e8f4fd;
      border: 1px solid #90caf9;
      border-radius: 7px;
      padding: 11px 14px;
      margin-bottom: 12px;
    }
    .summary-box-title { font-size: 12px; font-weight: 700; color: #1565c0; margin-bottom: 8px; }
    .summary-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px; align-items: center; }
    .summary-row:last-child { margin-bottom: 0; }
    .summary-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: #546e7a; min-width: 95px; flex-shrink: 0; }
    .summary-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 2px 8px;
      font-size: 12px;
      color: #333;
    }
    .star-hint {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 5px;
      padding: 5px 10px;
      font-size: 12px;
      color: #f57f17;
      margin-top: 7px;
    }

    /* ── Search & Filter bar ── */
    .search-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1;
      min-width: 160px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
      background: #fff;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: #3949ab; box-shadow: 0 0 0 2px rgba(57,73,171,.12); }
    .filter-btn {
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid #e0e0e0;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: background .1s;
      color: #555;
      white-space: nowrap;
    }
    .filter-btn:hover { background: #f5f5f5; }
    .filter-btn.active { background: #3949ab; color: #fff; border-color: #3949ab; }

    /* ── Search highlight ── */
    mark.hl { background: #FFE082; color: #212121; border-radius: 2px; padding: 0 1px; font-style: normal; }

    /* ── Error ── */
    .error-box {
      background: #ffebee;
      border: 1px solid #ef9a9a;
      border-radius: 6px;
      padding: 10px 14px;
      color: #b71c1c;
      font-size: 13px;
      margin-bottom: 8px;
    }

    /* ── Footer ── */
    footer {
      background: #212121;
      color: #9e9e9e;
      text-align: center;
      padding: 10px 16px;
      font-size: 14px;
      flex-shrink: 0;
    }
    footer a { color: #17b3d9; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>

<script>
'use strict';

// ================================================================
//  UTILS
// ================================================================

function esc(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function isLightColor(hex) {
  try {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return (r * 299 + g * 587 + b * 114) / 1000 > 155;
  } catch (e) {
    return false;
  }
}

function lastSegment(uri) {
  return (uri || '').split(/[:/]/).filter(Boolean).pop() || uri;
}

function childrenByName(el, localName) {
  const result = [];
  if (!el) return result;
  for (const child of el.children) {
    if (child.localName === localName) result.push(child);
  }
  return result;
}

function childByName(el, localName) {
  if (!el) return null;
  for (const child of el.children) {
    if (child.localName === localName) return child;
  }
  return null;
}

function descendantByName(el, localName) {
  if (!el) return null;
  for (const child of el.children) {
    if (child.localName === localName) return child;
    const found = descendantByName(child, localName);
    if (found) return found;
  }
  return null;
}

// ================================================================
//  XACML PARSER
// ================================================================
const XACMLParser = (() => {

  function parseAttributeValue(avEl) {
    if (!avEl) return { dataType: 'string', value: '' };
    const dataType = avEl.getAttribute('DataType') || '';

    if (dataType.includes('CV')) {
      const cv = descendantByName(avEl, 'CodedValue');
      if (cv) {
        return {
          dataType: 'CV',
          code: cv.getAttribute('code') || '',
          codeSystem: cv.getAttribute('codeSystem') || ''
        };
      }
    }

    if (dataType.includes('II')) {
      const ii = descendantByName(avEl, 'InstanceIdentifier');
      if (ii) {
        const root = ii.getAttribute('root') || '';
        return { dataType: 'II', root, isWildcard: root === '*' };
      }
    }

    return {
      dataType: dataType.includes('anyURI') ? 'anyURI' : 'string',
      value: (avEl.textContent || '').trim()
    };
  }

  function parseDesignator(el) {
    if (!el) return { attributeId: '', dataType: '' };
    return {
      attributeId: el.getAttribute('AttributeId') || '',
      dataType:    el.getAttribute('DataType') || ''
    };
  }

  function parseMatch(matchEl) {
    const matchId = matchEl.getAttribute('MatchId') || '';
    const avEl    = childByName(matchEl, 'AttributeValue');
    const value   = parseAttributeValue(avEl);

    let designator = { attributeId: '', dataType: '' };
    for (const child of matchEl.children) {
      const ln = child.localName;
      if (ln === 'SubjectAttributeDesignator' ||
          ln === 'ResourceAttributeDesignator' ||
          ln === 'ActionAttributeDesignator') {
        designator = parseDesignator(child);
        break;
      }
    }

    return { matchId, value, designator };
  }

  function parseMatchGroup(containerEl, matchLocalName) {
    return childrenByName(containerEl, matchLocalName).map(parseMatch);
  }

  function parseTarget(targetEl) {
    if (!targetEl) return null;
    const result = { subjects: [], resources: [], actions: [] };

    const subjectsEl  = childByName(targetEl, 'Subjects');
    const resourcesEl = childByName(targetEl, 'Resources');
    const actionsEl   = childByName(targetEl, 'Actions');

    if (subjectsEl) {
      result.subjects = childrenByName(subjectsEl, 'Subject')
        .map(s => parseMatchGroup(s, 'SubjectMatch'));
    }
    if (resourcesEl) {
      result.resources = childrenByName(resourcesEl, 'Resource')
        .map(r => parseMatchGroup(r, 'ResourceMatch'));
    }
    if (actionsEl) {
      result.actions = childrenByName(actionsEl, 'Action')
        .map(a => parseMatchGroup(a, 'ActionMatch'));
    }

    if (!subjectsEl && !resourcesEl && !actionsEl) {
      for (const anyOf of childrenByName(targetEl, 'AnyOf')) {
        for (const allOf of childrenByName(anyOf, 'AllOf')) {
          for (const matchEl of childrenByName(allOf, 'Match')) {
            const m = parseMatch(matchEl);
            let designatorLocalName = '';
            for (const child of matchEl.children) {
              if (child.localName.includes('Designator')) {
                designatorLocalName = child.localName;
                break;
              }
            }
            if (designatorLocalName.includes('Subject'))        result.subjects.push([m]);
            else if (designatorLocalName.includes('Resource'))  result.resources.push([m]);
            else if (designatorLocalName.includes('Action'))    result.actions.push([m]);
          }
        }
      }
    }

    return result;
  }

  function parseApply(applyEl) {
    const functionId = applyEl.getAttribute('FunctionId') || '';
    const args = [];
    for (const child of applyEl.children) {
      const ln = child.localName;
      if (ln === 'Apply') {
        args.push({ nodeType: 'Apply', ...parseApply(child) });
      } else if (ln === 'Function') {
        args.push({ nodeType: 'Function', functionId: child.getAttribute('FunctionId') || '' });
      } else if (ln === 'SubjectAttributeDesignator') {
        args.push({ nodeType: 'SubjectAttr', ...parseDesignator(child) });
      } else if (ln === 'ResourceAttributeDesignator') {
        args.push({ nodeType: 'ResourceAttr', ...parseDesignator(child) });
      } else if (ln === 'ActionAttributeDesignator') {
        args.push({ nodeType: 'ActionAttr', ...parseDesignator(child) });
      } else if (ln === 'AttributeValue') {
        args.push({ nodeType: 'Value', ...parseAttributeValue(child) });
      }
    }
    return { functionId, args };
  }

  function parseCondition(condEl) {
    if (!condEl) return null;
    const applyEl = childByName(condEl, 'Apply');
    if (!applyEl) return null;
    return parseApply(applyEl);
  }

  function parseRule(ruleEl) {
    const ruleId      = ruleEl.getAttribute('RuleId') || '';
    const effect      = ruleEl.getAttribute('Effect') || 'Permit';
    const descEl      = childByName(ruleEl, 'Description');
    const description = descEl ? (descEl.textContent || '').trim() : '';
    const target      = parseTarget(childByName(ruleEl, 'Target'));
    const condition   = parseCondition(childByName(ruleEl, 'Condition'));
    return { ruleId, effect, description, target, condition };
  }

  function parse(xmlText, filename) {
    let doc;
    try {
      doc = new DOMParser().parseFromString(xmlText, 'application/xml');
      const err = doc.querySelector('parsererror');
      if (err) throw new Error(err.textContent.split('\n')[0]);
    } catch (e) {
      throw new Error('XML Parse-Fehler: ' + e.message);
    }

    const root = doc.documentElement;
    if (root.localName !== 'Policy') {
      throw new Error('Kein <Policy>-Element gefunden');
    }

    const policyId    = root.getAttribute('PolicyId') || filename;
    const algorithm   = root.getAttribute('RuleCombiningAlgId') || '';
    const ns          = root.namespaceURI || '';
    const version     = ns.includes('2.0') ? '2.0' : '3.0';
    const descEl      = childByName(root, 'Description');
    const description = descEl ? (descEl.textContent || '').trim() : '';
    const target      = parseTarget(childByName(root, 'Target'));
    const rules       = childrenByName(root, 'Rule').map(parseRule);

    return { policyId, filename, version, algorithm, description, target, rules };
  }

  return { parse };
})();

// ================================================================
//  CSV PARSER
// ================================================================
const CSVParser = (() => {

  function parse(csvText) {
    const lines = csvText.split(/\r?\n/);
    if (lines.length < 2) throw new Error('CSV ist leer');

    const headers = lines[0].split(';').map(h => h.trim());
    const idIdx    = headers.indexOf('id');
    const labelIdx = headers.indexOf('label');
    if (idIdx < 0 || labelIdx < 0) throw new Error('CSV muss "id" und "label" Spalten enthalten');

    const entries = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const cols = line.split(';');
      const entry = {};
      headers.forEach((h, j) => { entry[h] = (cols[j] || '').trim(); });
      entries.push(entry);
    }
    return entries;
  }

  return { parse };
})();

// ================================================================
//  LABEL MAPPER
// ================================================================
const LabelMapper = (() => {
  let _byId = {};
  let _loaded = false;

  function load(entries) {
    _byId = {};
    for (const e of entries) {
      if (e.id) _byId[e.id] = e;
    }
    _loaded = true;
  }

  function lookup(id) {
    if (!id) return null;
    return _byId[id.trim()] || null;
  }

  function lookupCV(code, codeSystem) {
    return _byId[`${code}@${codeSystem}`] || null;
  }

  function isLoaded() { return _loaded; }
  function clear() { _byId = {}; _loaded = false; }

  return { load, lookup, lookupCV, isLoaded, clear };
})();

// ================================================================
//  TREE RENDERER
// ================================================================
const TreeRenderer = (() => {
  const FALLBACK_COLOR = '#607D8B';
  const FHIR_VERSION   = 'R4';
  // FHIR resource-type attributeId
  const FHIR_ATTR_ID   = 'http://hl7.org/fhir/resource-types';

  // ── Logic chips ──

  function oderChip() {
    return `<span class="logic-chip oder">ODER`
         + `<span class="tooltip" style="min-width:210px">Eine dieser Bedingungen muss zutreffen</span>`
         + `</span>`;
  }

  function undChip() {
    return `<span class="logic-chip und">UND`
         + `<span class="tooltip" style="min-width:210px">Alle Bedingungen m&uuml;ssen gleichzeitig zutreffen</span>`
         + `</span>`;
  }

  // ── Chip rendering ──

  function chipHtml(label, description, uri, color, prefix) {
    const bg = color || FALLBACK_COLOR;
    const fg = isLightColor(bg) ? '#212121' : '#ffffff';
    const tooltipParts = [];
    if (description) tooltipParts.push(esc(description));
    if (uri)         tooltipParts.push(`<span class="tooltip-uri">${esc(uri)}</span>`);
    const tooltip = tooltipParts.length
      ? `<span class="tooltip">${tooltipParts.join('<br>')}</span>` : '';
    return `<span class="chip" style="background:${bg};color:${fg};border-color:${bg}">`
         + (prefix || '')
         + esc(label)
         + tooltip
         + `</span>`;
  }

  function fallbackChip(uri) {
    const tip = LabelMapper.isLoaded()
      ? `Kein Label im Mapping gefunden<span class="tooltip-uri">${esc(uri)}</span>`
      : `<span class="tooltip-uri">${esc(uri)}</span>`;
    return `<span class="chip fallback">${esc(uri)}<span class="tooltip">${tip}</span></span>`;
  }

  // Returns chip HTML + optional FHIR link for a match value
  function valueChip(matchValue, attributeId) {
    const { dataType, value, code, codeSystem, root, isWildcard } = matchValue;
    const isFhir = attributeId === FHIR_ATTR_ID;

    if (dataType === 'CV') {
      const e = LabelMapper.lookupCV(code, codeSystem);
      if (e) return chipHtml(e.label, e.description, `${code}@${codeSystem}`, e.color);
      return chipHtml(code, `CodeSystem: ${codeSystem}`, `${code}@${codeSystem}`, FALLBACK_COLOR);
    }

    if (dataType === 'II') {
      if (isWildcard) {
        return `<span class="chip" style="background:#fff8e1;color:#f57f17;border-color:#ffe082">`
             + `<span class="star">&#x2B50;</span>Alle Patienten (Wildcard)`
             + `<span class="tooltip">Wildcard-Policy: Gilt automatisch f&uuml;r alle Patientenakten`
             + `<span class="tooltip-uri">root=&apos;*&apos;</span></span></span>`;
      }
      return chipHtml(root || 'II', '', root, '#795548');
    }

    // string / anyURI
    const v = (value || '').trim();
    const e = LabelMapper.lookup(v);

    if (isFhir) {
      // FHIR resource: chip + spec link
      const chip = e
        ? chipHtml(e.label, e.description, v, e.color)
        : chipHtml(v, '', v, '#1565c0');
      const link = `<a class="fhir-link" href="https://hl7.org/fhir/${FHIR_VERSION}/${v.toLowerCase()}.html"`
                 + ` target="_blank" rel="noopener" title="FHIR ${FHIR_VERSION} Spezifikation: ${esc(v)}">&#x1F517;</a>`;
      return chip + link;
    }

    if (e) return chipHtml(e.label, e.description, v, e.color);
    return fallbackChip(v);
  }

  // Returns plain text label for a matchValue (for summary box)
  function getValueLabel(matchValue) {
    const { dataType, value, code, codeSystem, root } = matchValue;
    if (dataType === 'CV') {
      const e = LabelMapper.lookupCV(code, codeSystem);
      return e ? e.label : code;
    }
    if (dataType === 'II') return root || 'II';
    const v = (value || '').trim();
    const e = LabelMapper.lookup(v);
    return e ? e.label : lastSegment(v);
  }

  // Attribute label with tooltip (used in readable sentences)
  function matchAttrLabel(attributeId) {
    const e     = LabelMapper.lookup(attributeId);
    const label = e ? e.label : lastSegment(attributeId);
    const desc  = e ? e.description : '';
    const tip   = `${desc ? esc(desc) + '<br>' : ''}<span class="tooltip-uri">${esc(attributeId)}</span>`;
    return `<span class="match-attr-label">${esc(label)}<span class="tooltip">${tip}</span></span>`;
  }

  // ── Match group rendering (outer=ODER, inner=UND, readable sentences) ──

  function renderMatchGroups(groups, groupLabel) {
    if (!groups || groups.length === 0) return '';

    const groupsHtml = groups.map(group => {
      if (!group || group.length === 0) return '';

      // Each match → readable sentence: [attr label] ist [value chip]
      const parts = group.map(match => {
        const attrId  = match.designator ? match.designator.attributeId : '';
        const valHtml = valueChip(match.value, attrId);
        const attrHtml = matchAttrLabel(attrId);
        return `<span class="match-sentence">${attrHtml}<span class="match-connector">ist</span>${valHtml}</span>`;
      });

      return parts.join(undChip());
    });

    const combined = groupsHtml
      .filter(Boolean)
      .map(g => `<span class="or-group">${g}</span>`)
      .join(oderChip());

    return `<div class="match-group">`
         + `<div class="mg-label">${groupLabel}</div>`
         + `<div class="mg-items">${combined}</div>`
         + `</div>`;
  }

  // ── Condition rendering ──

  function condNode(node) {
    if (!node) return '';
    switch (node.nodeType) {
      case 'Apply':   return condApply(node);
      case 'Function': {
        const e = LabelMapper.lookup(node.functionId);
        const label = e ? e.label : lastSegment(node.functionId);
        return `<em>${esc(label)}</em>`;
      }
      case 'SubjectAttr': {
        const e = LabelMapper.lookup(node.attributeId);
        return `<span class="cond-subj">${esc(e ? e.label : lastSegment(node.attributeId))}</span>`;
      }
      case 'ResourceAttr': {
        const e = LabelMapper.lookup(node.attributeId);
        return `<span class="cond-res">${esc(e ? e.label : lastSegment(node.attributeId))}</span>`;
      }
      case 'ActionAttr': {
        const e = LabelMapper.lookup(node.attributeId);
        return `<span class="cond-act">${esc(e ? e.label : lastSegment(node.attributeId))}</span>`;
      }
      case 'Value': {
        if (node.dataType === 'CV')  return `<span class="cond-val">${esc(node.code)}@${esc(node.codeSystem)}</span>`;
        if (node.dataType === 'II')  return `<span class="cond-val">${node.isWildcard ? '*' : esc(node.root)}</span>`;
        return `<span class="cond-val">${esc((node.value || '').trim())}</span>`;
      }
      default: return '';
    }
  }

  function condApply(apply) {
    const fn = apply.functionId || '';

    if (fn.includes(':not')) {
      const inner = apply.args[0] ? condNode(apply.args[0]) : '';
      return `<span class="cond-not">&#x26D4; NICHT</span>(${inner})`;
    }

    if (fn.includes('any-of-any')) {
      // Render as readable: [left attr] entspricht [right attr]
      const attrArgs = apply.args.filter(a => a.nodeType !== 'Function');
      if (attrArgs.length === 2) {
        return `${condNode(attrArgs[0])} <em style="color:#9e9e9e">entspricht</em> ${condNode(attrArgs[1])}`;
      }
      const argStrs = apply.args.map(condNode).filter(Boolean);
      return `<span class="cond-fn">${esc(lastSegment(fn))}</span>(${argStrs.join(', ')})`;
    }

    const e = LabelMapper.lookup(fn);
    const fnLabel = e ? e.label : lastSegment(fn);
    const argStrs = apply.args.map(condNode).filter(Boolean);
    return `<span class="cond-fn">${esc(fnLabel)}</span>(${argStrs.join(', ')})`;
  }

  function renderCondition(cond, effect) {
    if (!cond) return '';

    const isDeny    = effect === 'Deny';
    const impactCls = isDeny ? 'deny' : 'permit';
    const impactIco = isDeny ? '&#x274C;' : '&#x2705;';
    const impactLbl = isDeny ? 'Deny' : 'Permit';

    // Detect top-level NOT (negated condition)
    const isNegated = cond.functionId && cond.functionId.includes(':not');
    const negHint   = isNegated
      ? ` <span style="font-size:11px;color:#757575;font-weight:400">&mdash; Bedingung ist negiert (NOT)</span>`
      : '';

    const impactHtml = `<div class="cond-impact ${impactCls}">`
                     + `${impactIco} Wenn WAHR &rarr; Regel wird angewendet (${impactLbl})`
                     + negHint
                     + `</div>`;

    const condHtml = condApply(cond);

    return `<div class="match-group">`
         + `<div class="mg-label">&#x1F50D; Bedingung</div>`
         + `<div class="condition-block">${impactHtml}${condHtml}</div>`
         + `</div>`;
  }

  // ── Target ──

  function renderTarget(target) {
    if (!target) return '';
    const { subjects = [], resources = [], actions = [] } = target;
    let html = '';
    if (subjects.length)  html += renderMatchGroups(subjects,  '&#x1F464; Wer (Subject)');
    if (resources.length) html += renderMatchGroups(resources, '&#x1F4E6; Ressourcen');
    if (actions.length)   html += renderMatchGroups(actions,   '&#x26A1; Action');
    return html;
  }

  // ── Algorithm chip ──

  function renderAlgo(algoUri) {
    const e = LabelMapper.lookup(algoUri);
    const label = e ? e.label : lastSegment(algoUri);
    const desc  = e ? e.description : '';
    const tip   = `${desc ? esc(desc) + '<br>' : ''}<span class="tooltip-uri">${esc(algoUri)}</span>`;
    return `<span class="algo-chip">&#x2699;&#xFE0F; ${esc(label)}`
         + `<span class="tooltip">${tip}</span></span>`;
  }

  // ── Summary box ──

  function renderSummaryBox(policy) {
    const permitCount = policy.rules.filter(r => r.effect !== 'Deny').length;
    const denyCount   = policy.rules.filter(r => r.effect === 'Deny').length;

    // Collect subjects/roles from policy target
    const subjectLabels = [];
    if (policy.target && policy.target.subjects) {
      for (const group of policy.target.subjects) {
        for (const match of group) {
          const label = getValueLabel(match.value);
          if (label && !subjectLabels.includes(label)) subjectLabels.push(label);
        }
      }
    }

    // Detect wildcard-policy
    const isStarPolicy = (policy.target && policy.target.resources || []).some(
      group => group.some(m => m.value && m.value.isWildcard)
    );

    // Collect FHIR resources and their access modes from rules
    const fhirResMap = new Map(); // type → Set<'read'|'write'>
    for (const rule of policy.rules) {
      if (!rule.target) continue;
      const actions = (rule.target.actions || []).flatMap(ag => ag.map(m => (m.value.value || '').toLowerCase()));
      const hasRead  = actions.some(a => a.includes('view') || a.includes('retrieve') || a.includes('query') || a.includes('response'));
      const hasWrite = actions.some(a =>
        a.includes('add-clinical') || a.includes('register') || a.includes('provide') ||
        a.includes('delete') || a.includes('update') || a.includes('remove')
      );
      for (const group of (rule.target.resources || [])) {
        for (const match of group) {
          if (match.designator && match.designator.attributeId === FHIR_ATTR_ID) {
            const type = (match.value.value || '').trim();
            if (!type) continue;
            if (!fhirResMap.has(type)) fhirResMap.set(type, new Set());
            if (hasRead)  fhirResMap.get(type).add('read');
            if (hasWrite) fhirResMap.get(type).add('write');
          }
        }
      }
    }

    let html = `<div class="summary-box">`;
    html += `<div class="summary-box-title">&#x1F4CA; Zusammenfassung</div>`;

    // Rule counts
    html += `<div class="summary-row">`;
    html += `<span class="summary-label">Regeln</span>`;
    html += `<span class="summary-chip" style="color:#2e7d32;border-color:#c8e6c9">&#x2705; ${permitCount}&nbsp;Permit</span>`;
    html += `<span class="summary-chip" style="color:#c62828;border-color:#ffcdd2">&#x274C; ${denyCount}&nbsp;Deny</span>`;
    html += `</div>`;

    // Subjects / roles
    if (subjectLabels.length > 0) {
      html += `<div class="summary-row">`;
      html += `<span class="summary-label">Zugang f&uuml;r</span>`;
      html += subjectLabels.map(l => `<span class="summary-chip">&#x1F464; ${esc(l)}</span>`).join('');
      html += `</div>`;
    }

    // FHIR resources
    if (fhirResMap.size > 0) {
      const entries = Array.from(fhirResMap.entries());
      const MAX_SHOW = 5;
      const visible = entries.slice(0, MAX_SHOW);
      const hidden  = entries.slice(MAX_SHOW);
      const togId   = 'smr_' + Math.random().toString(36).slice(2, 7);

      html += `<div class="summary-row">`;
      html += `<span class="summary-label">FHIR-Ressourcen</span>`;

      const renderResChip = ([type, modes]) => {
        const readOnly = !modes.has('write');
        const badge    = readOnly ? 'READ' : 'READ+WRITE';
        const bColor   = readOnly ? '#1565c0' : '#2e7d32';
        return `<span class="summary-chip">`
             + `<a class="fhir-link" href="https://hl7.org/fhir/${FHIR_VERSION}/${type.toLowerCase()}.html" target="_blank" rel="noopener" title="FHIR ${FHIR_VERSION}: ${esc(type)}">&#x1F517;</a>`
             + ` ${esc(type)}&nbsp;<span style="color:${bColor};font-size:10px;font-weight:700">${badge}</span>`
             + `</span>`;
      };

      html += visible.map(renderResChip).join('');

      if (hidden.length > 0) {
        html += `<span class="summary-chip" id="${togId}" style="cursor:pointer;color:#3949ab;border-color:#9fa8da"`
              + ` onclick="document.querySelectorAll('.${togId}').forEach(e=>e.style.display='inline-flex');document.getElementById('${togId}').style.display='none'"`
              + `>+${hidden.length} weitere</span>`;
        html += hidden.map(e => {
          const chip = renderResChip(e);
          return chip.replace('class="summary-chip"', `class="summary-chip ${togId}" style="display:none"`);
        }).join('');
      }

      html += `</div>`;
    }

    if (isStarPolicy) {
      html += `<div class="star-hint">&#x2B50; Wildcard-Policy: Gilt automatisch f&uuml;r alle Patientenakten &mdash; kein Zustimmungsdokument erforderlich.</div>`;
    }

    html += `</div>`;
    return html;
  }

  // ── Rule ──

  function renderRule(rule, index) {
    const isDeny    = rule.effect === 'Deny';
    const cls       = isDeny ? 'deny' : 'permit';
    const badge     = isDeny ? 'DENY' : 'PERMIT';
    const titleText = rule.description
      ? esc(rule.description)
      : `<span class="rule-no-desc">Regel ${index + 1} (keine Beschreibung)</span>`;

    // Plain-text for search
    const searchText = (rule.description || `Regel ${index + 1}`).toLowerCase();

    let body = '';
    if (rule.target)    body += renderTarget(rule.target);
    if (rule.condition) {
      body += renderCondition(rule.condition, rule.effect);
    } else {
      body += `<div class="no-cond-hint">&#x2139;&#xFE0F; Keine Zusatzbedingung &mdash; Regel greift immer wenn Subject passt</div>`;
    }

    const bodyId = `rb_${index}_${Math.random().toString(36).slice(2, 7)}`;

    return `<div class="rule-card ${cls}" data-effect="${cls}" data-search="${esc(searchText)}">`
         + `<div class="rule-hdr" onclick="TreeRenderer.toggleRule('${bodyId}',this)">`
         + `<span class="effect-badge">${badge}</span>`
         + `<span class="rule-title">${titleText}</span>`
         + (body ? `<span class="rule-toggle">&#x25B6;</span>` : '')
         + `</div>`
         + (body ? `<div class="rule-body" id="${bodyId}">${body}</div>` : '')
         + `</div>`;
  }

  // ── Full policy (accordion wrapper) ──

  function render(policy) {
    const permitCount = policy.rules.filter(r => r.effect !== 'Deny').length;
    const denyCount   = policy.rules.filter(r => r.effect === 'Deny').length;
    const shortId     = policy.policyId.split(':').pop();
    const bodyId      = 'accb_' + Math.random().toString(36).slice(2, 7);

    // Accordion header
    let html = `<div class="acc-panel">`;
    html += `<div class="acc-hdr is-open" onclick="TreeRenderer.toggleAccordion('${bodyId}',this)">`;
    html += `<span class="acc-hdr-icon">&#x1F4CB;</span>`;
    html += `<div class="acc-hdr-info">`;
    html += `<div class="acc-hdr-title">${esc(shortId)}</div>`;
    if (policy.description) {
      const desc = policy.description.length > 130
        ? policy.description.slice(0, 130) + '…'
        : policy.description;
      html += `<div class="acc-hdr-desc">${esc(desc)}</div>`;
    }
    html += `</div>`;
    html += `<div class="acc-hdr-badges">`;
    html += `<span style="color:#2e7d32;font-size:12px;font-weight:700">&#x2705;&nbsp;${permitCount}P</span>`;
    html += `<span style="color:#c62828;font-size:12px;font-weight:700">&#x274C;&nbsp;${denyCount}D</span>`;
    html += renderAlgo(policy.algorithm);
    html += `<span style="font-size:11px;color:#9e9e9e">XACML&nbsp;${policy.version}</span>`;
    html += `</div>`;
    html += `<span class="acc-chevron open">&#x25B6;</span>`;
    html += `</div>`; // acc-hdr

    // Accordion body
    html += `<div class="acc-body open" id="${bodyId}">`;
    html += `<div class="acc-inner"><div class="acc-inner-content">`;

    // Summary box
    html += renderSummaryBox(policy);

    // Policy-level target
    if (policy.target) {
      const t = policy.target;
      const hasContent = (t.subjects || []).length + (t.resources || []).length + (t.actions || []).length > 0;
      if (hasContent) {
        html += `<div class="policy-target">`;
        html += `<div class="section-label">&#x1F3AF; Policy-Target &mdash; gilt f&uuml;r alle Regeln</div>`;
        html += renderTarget(policy.target);
        html += `</div>`;
      }
    }

    // Expand/collapse buttons
    html += `<div class="policy-hdr-ctrl">`;
    html += `<button class="ctrl-btn" onclick="TreeRenderer.expandAll()">&#x25BC; Alle aufklappen</button>`;
    html += `<button class="ctrl-btn" onclick="TreeRenderer.collapseAll()">&#x25B6; Alle zuklappen</button>`;
    html += `</div>`;

    // Rules
    policy.rules.forEach((rule, i) => { html += renderRule(rule, i); });

    html += `</div></div></div>`; // acc-inner-content, acc-inner, acc-body
    html += `</div>`; // acc-panel

    return html;
  }

  // ── Public interaction ──

  function toggleAccordion(bodyId, hdrEl) {
    const body = document.getElementById(bodyId);
    if (!body) return;
    const open = body.classList.toggle('open');
    const chevron = hdrEl.querySelector('.acc-chevron');
    if (chevron) chevron.classList.toggle('open', open);
    hdrEl.classList.toggle('is-open', open);
  }

  function toggleRule(bodyId, headerEl) {
    const body = document.getElementById(bodyId);
    if (!body) return;
    const open = body.classList.toggle('open');
    const toggle = headerEl.querySelector('.rule-toggle');
    if (toggle) toggle.classList.toggle('open', open);
  }

  function expandAll() {
    document.querySelectorAll('.rule-body').forEach(b => b.classList.add('open'));
    document.querySelectorAll('.rule-toggle').forEach(t => t.classList.add('open'));
    document.querySelectorAll('.acc-body').forEach(b => b.classList.add('open'));
    document.querySelectorAll('.acc-chevron').forEach(c => c.classList.add('open'));
    document.querySelectorAll('.acc-hdr').forEach(h => h.classList.add('is-open'));
  }

  function collapseAll() {
    document.querySelectorAll('.rule-body').forEach(b => b.classList.remove('open'));
    document.querySelectorAll('.rule-toggle').forEach(t => t.classList.remove('open'));
    // Keep accordion panels visible so controls are accessible
  }

  return { render, toggleAccordion, toggleRule, expandAll, collapseAll };
})();

// ================================================================
//  UI STATE
// ================================================================
const UIState = (() => {
  let policies  = [];
  let activeIdx = -1;

  function addOrReplace(policy) {
    const existing = policies.findIndex(p => p.filename === policy.filename);
    if (existing >= 0) { policies[existing] = policy; return existing; }
    policies.push(policy);
    return policies.length - 1;
  }

  function setActive(idx) { activeIdx = idx; }
  function getActive()    { return activeIdx >= 0 ? policies[activeIdx] : null; }
  function getAll()       { return policies; }

  return { addOrReplace, setActive, getActive, getAll };
})();

// ================================================================
//  APP
// ================================================================
const App = (() => {
  let _currentFilter = 'all';
  let _currentSearch = '';

  function triggerCSV() { document.getElementById('csv-input').click(); }
  function triggerXML() { document.getElementById('xml-input').click(); }

  async function loadCSV(input) {
    const file = input.files[0];
    if (!file) return;
    try {
      const text    = await file.text();
      const entries = CSVParser.parse(text);
      LabelMapper.load(entries);
      const active = UIState.getActive();
      if (active) showPolicy(active);
      refreshSidebar();
      const btn = document.getElementById('csv-btn');
      if (btn) {
        const orig = btn.textContent;
        btn.textContent = '\u2713 ' + entries.length + ' Labels geladen';
        setTimeout(() => { btn.textContent = orig; }, 2500);
      }
    } catch (e) {
      alert('CSV-Fehler: ' + e.message);
    }
    input.value = '';
  }

  async function loadXMLs(input) {
    const files = Array.from(input.files).filter(f => f.name.toLowerCase().endsWith('.xml'));
    if (!files.length) return;

    let firstIdx = -1;
    const errors = [];

    for (const file of files) {
      try {
        const text   = await file.text();
        const policy = XACMLParser.parse(text, file.name);
        const idx    = UIState.addOrReplace(policy);
        if (firstIdx < 0) firstIdx = idx;
      } catch (e) {
        errors.push(file.name + ': ' + e.message);
      }
    }

    refreshSidebar();
    if (firstIdx >= 0) activatePolicy(firstIdx);
    if (errors.length > 0) alert('Fehler beim Laden:\n' + errors.join('\n'));
    input.value = '';
  }

  function activatePolicy(idx) {
    UIState.setActive(idx);
    const policy = UIState.getActive();
    if (policy) showPolicy(policy);
    refreshSidebar();
  }

  function showPolicy(policy) {
    const sv = esc(_currentSearch);
    const searchBar = `<div class="search-bar">`
      + `<input class="search-input" id="s-input" type="text" value="${sv}"`
      + ` placeholder="&#x1F50D; Suchen (Beschreibung, Label, URI...)" oninput="App.applySearch(this.value)">`
      + `<button class="filter-btn${_currentFilter==='all'?' active':''}" id="f-all" onclick="App.setFilter('all')">Alle</button>`
      + `<button class="filter-btn${_currentFilter==='permit'?' active':''}" id="f-permit" onclick="App.setFilter('permit')">&#x2705; Nur Permit</button>`
      + `<button class="filter-btn${_currentFilter==='deny'?' active':''}" id="f-deny" onclick="App.setFilter('deny')">&#x274C; Nur Deny</button>`
      + `</div>`;

    document.getElementById('content').innerHTML = searchBar + TreeRenderer.render(policy);

    if (_currentSearch || _currentFilter !== 'all') {
      _applyFiltersAndSearch();
    }
  }

  function applySearch(query) {
    _currentSearch = query.trim();
    _applyFiltersAndSearch();
  }

  function setFilter(type) {
    _currentFilter = type;
    ['all', 'permit', 'deny'].forEach(t => {
      const btn = document.getElementById('f-' + t);
      if (btn) btn.classList.toggle('active', t === type);
    });
    _applyFiltersAndSearch();
  }

  function _applyFiltersAndSearch() {
    const query = _currentSearch.toLowerCase();

    document.querySelectorAll('.rule-card').forEach(card => {
      const effect = card.dataset.effect || '';
      const text   = (card.dataset.search || '') + ' ' + card.textContent.toLowerCase();

      const passFilter = _currentFilter === 'all'
        || (_currentFilter === 'permit' && effect === 'permit')
        || (_currentFilter === 'deny'   && effect === 'deny');

      const passSearch = !query || text.includes(query);

      const visible = passFilter && passSearch;
      card.style.display = visible ? '' : 'none';

      // Auto-expand rule body if search matches
      if (visible && query) {
        const body   = card.querySelector('.rule-body');
        const toggle = card.querySelector('.rule-toggle');
        if (body)   body.classList.add('open');
        if (toggle) toggle.classList.add('open');
      }
    });

    // Highlight query in rule titles
    document.querySelectorAll('.rule-title').forEach(el => {
      if (!el.dataset.origHtml) el.dataset.origHtml = el.innerHTML;
      el.innerHTML = el.dataset.origHtml; // restore

      if (query) {
        const text  = el.textContent;
        const lower = text.toLowerCase();
        const idx   = lower.indexOf(query);
        if (idx >= 0) {
          el.innerHTML = esc(text.slice(0, idx))
            + `<mark class="hl">${esc(text.slice(idx, idx + query.length))}</mark>`
            + esc(text.slice(idx + query.length));
        }
      }
    });
  }

  function refreshSidebar() {
    const list     = document.getElementById('sidebar-list');
    const policies = UIState.getAll();
    const active   = UIState.getActive();

    if (!policies.length) {
      list.innerHTML = '<div class="sb-empty">Noch keine Dateien geladen</div>';
      return;
    }

    list.innerHTML = policies.map((p, i) => {
      const isActive    = p === active;
      const permitCount = p.rules.filter(r => r.effect !== 'Deny').length;
      const denyCount   = p.rules.filter(r => r.effect === 'Deny').length;
      const total       = p.rules.length;
      const pPct        = total > 0 ? (permitCount / total * 100).toFixed(1) : 0;
      const dPct        = total > 0 ? (denyCount   / total * 100).toFixed(1) : 0;
      const shortName   = p.filename.replace(/\.xml$/i, '');

      return `<div class="sb-item${isActive ? ' active' : ''}" onclick="App.activatePolicy(${i})" title="${esc(p.filename)}">`
           + `<div class="sb-name">${esc(shortName)}</div>`
           + `<div class="sb-meta">${total} Regel${total !== 1 ? 'n' : ''} &middot; ${permitCount}P&thinsp;/&thinsp;${denyCount}D</div>`
           + `<div class="sb-bar">`
           + `<div class="sb-permit" style="width:${pPct}%"></div>`
           + `<div class="sb-deny" style="width:${dPct}%"></div>`
           + `</div></div>`;
    }).join('');
  }

  return { triggerCSV, triggerXML, loadCSV, loadXMLs, activatePolicy, applySearch, setFilter };
})();
</script>
</body>
</html>
